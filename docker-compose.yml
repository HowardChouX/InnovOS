version: "3.8"

services:
  # ─── PostgreSQL + pgvector ───────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: innovos
      POSTGRES_USER: innovos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innovos_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innovos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── MinIO (S3-compatible object storage) ────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-innovos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-innovos_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ─── Create MinIO bucket on startup ──────────────────────────
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-innovos} ${MINIO_ROOT_PASSWORD:-innovos_secret} &&
      mc mb myminio/${S3_BUCKET:-innovos-files} --ignore-existing &&
      echo 'MinIO bucket created' &&
      exit 0
      "
    restart: "no"

  # ─── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      # Database
      DATABASE_URL: postgresql://innovos:${POSTGRES_PASSWORD:-innovos_secret}@postgres:5432/innovos
      # JWT
      INNOVOS_JWT_SECRET: ${INNOVOS_JWT_SECRET:-9e7859a7edc6821df4f2d10d5c66262976e88f9b11ce48c673cc6ac33a1b92ff}
      INNOVOS_ENCRYPT_KEY: ${INNOVOS_ENCRYPT_KEY:-7UHj4l3LxK6dwxR7Sgof0E_SEaYFCWItu5b-57IfPe4=}
      # S3 / MinIO
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-innovos}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-innovos_secret}
      S3_BUCKET: ${S3_BUCKET:-innovos-files}
      S3_REGION: ${S3_REGION:-us-east-1}
      # Public URL for file access
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost}
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ─── Frontend (SPA + nginx reverse proxy) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
